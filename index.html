<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multimedia Portfolio | 3D Solar System</title>

<style>
:root{
 --bg-dark:#0a0c10; --bg-card:#0d1117; --border:#30363d;
 --accent:#58a6ff; --text:#eef2ff;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg-dark);font-family:Inter,system-ui;color:var(--text);}

.header{padding:30px 10%;font-size:28px;font-weight:800;color:var(--accent);}

.hero-video{
 max-width:1200px;margin:40px auto;border-radius:20px;overflow:hidden;
 box-shadow:0 40px 80px rgba(0,0,0,.6);
}
.hero-video iframe{width:100%;height:600px;border:none;}

.planet-grid{
 display:grid;grid-template-columns:repeat(auto-fill,minmax(400px,1fr));
 gap:40px;padding:60px 10%;
}
.card{
 background:var(--bg-card);border:1px solid var(--border);
 border-radius:20px;padding:30px;display:flex;flex-direction:column;
}
.card h2{color:var(--accent);margin-bottom:15px;}
.row{display:flex;justify-content:space-between;margin:8px 0;}
.desc{margin:15px 0;font-size:14px;opacity:.9;}
.video{position:relative;padding-bottom:56.25%;height:0;border-radius:12px;overflow:hidden;margin-top:auto;}
.video iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;}
</style>
</head>

<body>

<div class="header">3D Solar System</div>

<!-- BIG SOLAR SYSTEM VIDEO -->
<div class="hero-video">
    <iframe src="https://www.youtube.com/embed/LRMfNRX0mPE" allowfullscreen></iframe>
</div>

<div class="planet-grid" id="grid"></div>

<script>
const planets=[
{n:"Mercury",p:88,d:"57.9 million",v:"zUlkcbZ7Pvs",t:"Smallest planet with extreme temperatures."},
{n:"Venus",p:224.7,d:"108.2 million",v:"6hWwo9aIcmg",t:"Hottest planet due to thick atmosphere."},
{n:"Earth",p:365.25,d:"149.6 million",v:"UcKZSMwK7TA",t:"Only planet known to support life."},
{n:"Mars",p:687,d:"227.9 million",v:"IfG4B6wL7q8",t:"Red planet with largest volcano."},
{n:"Jupiter",p:4333,d:"778.6 million",v:"wIrbnshKDXc",t:"Gas giant with Great Red Spot."},
{n:"Saturn",p:10759,d:"1.4 billion",v:"LQlDUDf6JrE",t:"Planet with prominent rings."},
{n:"Uranus",p:30687,d:"2.9 billion",v:"XV_7KDQRoR4",t:"Rotates on its side."},
{n:"Neptune",p:60190,d:"4.5 billion",v:"nu4uB2BJwT0",t:"Furthest planet with strong winds."}
];

const grid=document.getElementById("grid");
planets.forEach(x=>{
 grid.innerHTML+=`
 <div class="card">
   <h2>${x.n}</h2>
   <div class="row"><span>Orbital Period</span><span>${x.p} days</span></div>
   <div class="row"><span>Distance</span><span>${x.d} km</span></div>
   <div class="desc">${x.t}</div>
   <div class="video"><iframe src="https://www.youtube.com/embed/${x.v}" allowfullscreen></iframe></div>
 </div>`;
});
</script>

</body>
</html>
