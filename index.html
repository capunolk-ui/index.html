<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multimedia Portfolio | 3D Authoring & Rotoscoping</title>

<style>
:root{
 --bg-dark:#0a0c10; --bg-card:#0d1117; --border:#30363d;
 --accent:#58a6ff; --text:#eef2ff; --text-gray:#8b949e;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg-dark);font-family:Inter,system-ui;color:var(--text)}

.header-nav{display:flex;justify-content:space-between;align-items:center;padding:1.5rem 10%;border-bottom:1px solid var(--border)}
.brand-logo{font-weight:800;color:var(--accent);cursor:pointer}
.nav-menu{display:flex;gap:2rem;list-style:none}
.nav-item{cursor:pointer;color:var(--text-gray)}
.nav-item.active{color:var(--accent)}

.hero-video{max-width:1200px;margin:40px auto;border-radius:18px;overflow:hidden;box-shadow:0 40px 80px rgba(0,0,0,.6)}
.hero-video iframe{width:100%;height:600px;border:none}

.planet-container{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:40px;padding:60px 10%}
.planet-card{background:var(--bg-card);border:1px solid var(--border);border-radius:18px;padding:30px;display:flex;flex-direction:column}
.planet-header{color:var(--accent);font-size:22px;margin-bottom:15px}
.row{display:flex;justify-content:space-between;margin:6px 0}
.desc{margin:15px 0;color:var(--text-gray)}
.video{position:relative;padding-bottom:56.25%;height:0;border-radius:12px;overflow:hidden;margin-top:auto}
.video iframe{position:absolute;width:100%;height:100%;border:none}

.page-content{display:none}
.page-content.active{display:block}
</style>
</head>

<body>

<nav class="header-nav">
 <div class="brand-logo" onclick="showPage('solar')">MULTIMEDIA.PRO</div>
 <ul class="nav-menu">
  <li class="nav-item active" id="link-solar" onclick="showPage('solar')">3D Solar System</li>
  <li class="nav-item" id="link-roto" onclick="showPage('roto')">Rotoscoping VFX</li>
 </ul>
</nav>

<!-- SOLAR PAGE -->
<div id="solar" class="page-content active">

<div class="hero-video">
 <iframe src="https://www.youtube.com/embed/LRMfNRX0mPE" allowfullscreen></iframe>
</div>

<div class="planet-container" id="grid"></div>

</div>

<!-- ROTO PAGE -->
<div id="roto" class="page-content">
 <div style="padding:80px 10%;text-align:center">
  <h1 style="color:var(--accent)">Rotoscoping Workflow</h1>
  <p style="color:var(--text-gray)">Your original roto content remains here.</p>
 </div>
</div>

<script>
function showPage(id){
 document.querySelectorAll('.page-content').forEach(p=>p.classList.remove('active'));
 document.getElementById(id).classList.add('active');
 document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
 if(id==='solar')document.getElementById('link-solar').classList.add('active');
 else document.getElementById('link-roto').classList.add('active');
}

const planets=[
["Mercury",88,"57.9 million","zUlkcbZ7Pvs"],
["Venus",224.7,"108.2 million","6hWwo9aIcmg"],
["Earth",365.25,"149.6 million","UcKZSMwK7TA"],
["Mars",687,"227.9 million","IfG4B6wL7q8"],
["Jupiter",4333,"778.6 million","wIrbnshKDXc"],
["Saturn",10759,"1.4 billion","LQlDUDf6JrE"],
["Uranus",30687,"2.9 billion","XV_7KDQRoR4"],
["Neptune",60190,"4.5 billion","nu4uB2BJwT0"]
];

const grid=document.getElementById("grid");
planets.forEach(p=>{
 grid.innerHTML+=`
 <div class="planet-card">
   <div class="planet-header">${p[0]}</div>
   <div class="row"><span>Orbital Period</span><span>${p[1]} days</span></div>
   <div class="row"><span>Distance</span><span>${p[2]} km</span></div>
   <div class="desc">Planet showcase video.</div>
   <div class="video">
     <iframe src="https://www.youtube.com/embed/${p[3]}" allowfullscreen></iframe>
   </div>
 </div>`;
});
</script>

</body>
</html>
