<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multimedia Portfolio | Emmanuel Capuno</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}
body{background:#0b0f14;color:#fff}
nav{background:#111;padding:15px;text-align:center;position:sticky;top:0}
nav button{
    background:#1f2a38;color:#fff;border:none;
    padding:10px 20px;margin:0 10px;
    cursor:pointer;border-radius:6px;font-size:16px
}
nav button:hover{background:#2e3c50}
.section{display:none;padding:40px 8%}
.active{display:block}
h1{text-align:center;margin-bottom:25px;font-size:36px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:25px}
.card{background:#121821;border-radius:10px;padding:15px;box-shadow:0 0 15px #000}
.card h3{text-align:center;margin-bottom:10px}
iframe{width:100%;height:220px;border-radius:8px;border:none}
.hero iframe{height:420px}
</style>

<script>
function showPage(id){
    document.querySelectorAll('.section').forEach(sec=>sec.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}
window.onload = ()=>showPage('solar');
</script>
</head>

<body>

<nav>
    <button onclick="showPage('solar')">Solar System</button>
    <button onclick="showPage('roto')">Rotoscoping</button>
</nav>

<!-- SOLAR SYSTEM PAGE -->
<div id="solar" class="section">
    <h1>Solar System Animation</h1>

    <div class="hero">
        <iframe src="https://www.youtube.com/embed/VIDEO_ID_SOLAR" allowfullscreen></iframe>
    </div>

    <div class="grid" style="margin-top:30px">
        <div class="card">
            <h3>Mercury</h3>
            <iframe src="https://www.youtube.com/embed/VIDEO_ID_MERCURY" allowfullscreen></iframe>
        </div>
        <div class="card">
            <h3>Venus</h3>
            <iframe src="https://www.youtube.com/embed/VIDEO_ID_VENUS" allowfullscreen></iframe>
        </div>
        <div class="card">
            <h3>Earth</h3>
            <iframe src="https://www.youtube.com/embed/VIDEO_ID_EARTH" allowfullscreen></iframe>
        </div>
        <div class="card">
            <h3>Mars</h3>
            <iframe src="https://www.youtube.com/embed/VIDEO_ID_MARS" allowfullscreen></iframe>
        </div>
        <div class="card">
            <h3>Jupiter</h3>
            <iframe src="https://www.youtube.com/embed/VIDEO_ID_JUPITER" allowfullscreen></iframe>
        </div>
        <div class="card">
            <h3>Saturn</h3>
            <iframe src="https://www.youtube.com/embed/VIDEO_ID_SATURN" allowfullscreen></iframe>
        </div>
        <div class="card">
            <h3>Uranus</h3>
            <iframe src="https://www.youtube.com/embed/VIDEO_ID_URANUS" allowfullscreen></iframe>
        </div>
        <div class="card">
            <h3>Neptune</h3>
            <iframe src="https://www.youtube.com/embed/VIDEO_ID_NEPTUNE" allowfullscreen></iframe>
        </div>
    </div>
</div>

<!-- ROTOSCOPING PAGE -->
<div id="roto" class="section">
    <h1>Rotoscoping Tutorial</h1>

    <div class="card">
        <h3>1 Minute Rotoscope Tutorial</h3>
        <iframe src="https://www.youtube.com/embed/VIDEO_ID_ROTO" allowfullscreen></iframe>
    </div>

    <h1 style="margin-top:40px">Weekly Progress</h1>

    <div class="grid" style="margin-top:20px">
        <div class="card">
            <h3>Week 1</h3>
            <iframe src="https://www.youtube.com/embed/VIDEO_ID_W1" allowfullscreen></iframe>
        </div>
        <div class="card">
            <h3>Week 2</h3>
            <iframe src="https://www.youtube.com/embed/VIDEO_ID_W2" allowfullscreen></iframe>
        </div>
        <div class="card">
            <h3>Week 3</h3>
            <iframe src="https://www.youtube.com/embed/VIDEO_ID_W3" allowfullscreen></iframe>
        </div>
    </div>
</div>

</body>
</html>
