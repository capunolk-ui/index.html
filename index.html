<script>

        document.getElementById('homePage').style.display = 'block';
        document.getElementById('solarPage').style.display = 'none';
        document.getElementById('rotoPage').style.display = 'none';
    }
    function showSolar() {
        document.getElementById('homePage').style.display = 'none';
        document.getElementById('solarPage').style.display = 'block';
        updatePlanets();
    }
    function showRoto() {
        document.getElementById('homePage').style.display = 'none';
        document.getElementById('rotoPage').style.display = 'block';
    }

    const planetData = [

        {

            embedId: "mrUZM4u1I0E"
        },
        {
            name: "Venus",
            factor: 0.6152,
            period: "225 days",
            distance: "108.2 million km",
            desc: "Hottest planet with dense toxic atmosphere.",
            img: "https://solarsystem.nasa.gov/system/feature_items/images/27_venus_jg.png",
            embedId: "zUlkcbZ7Pvs"
        },
        {
            name: "Earth",
            factor: 1,
            period: "365.25 days",

            img: "https://solarsystem.nasa.gov/system/feature_items/images/17_earth.png",
            embedId: "6hWwo9aIcmg"
        },
        {
            name: "Mars",
            factor: 1.8808,
            period: "687 days",
            distance: "227.9 million km",

        },
        {
            name: "Jupiter",
            factor: 11.86,
            period: "11.86 yrs",
            distance: "778.5 million km",
            desc: "Largest gas giant with powerful storms.",
            img: "https://solarsystem.nasa.gov/system/feature_items/images/16_jupiter_new.png",

        {

            embedId: "nu4uB2BJwT0"
        }
    ];

    function updatePlanets() {
        const earthAge = parseFloat(document.getElementById('ageInput').value) || 0;
        const grid = document.getElementById('planetGrid');
        grid.innerHTML = '';

        planetData.forEach(planet => {
            const age = (earthAge / planet.factor).toFixed(4);
            const revolutions = (earthAge / planet.factor).toFixed(2);

            grid.innerHTML += `
                <div class="planet-card">
                    <h2>${planet.name}</h2>

                    <div class="data-row"><span>Age:</span><span>${age} yrs</span></div>
                    <div class="data-row"><span>Revolutions:</span><span>${revolutions}</span></div>
                    <div class="data-row"><span>Orbital Period:</span><span>${planet.period}</span></div>
                    <div class="data-row"><span>Distance from Sun:</span><span>${planet.distance}</span></div>

                    <p style="margin-top:10px; font-size:0.85rem; color:#8b949e;">
                        <strong>Description:</strong> ${planet.desc}
                    </p>

                    <img src="${planet.img}" style="width:100%; border-radius:12px; margin-top:12px;">

                    <div class="video-container">
                        <iframe src="https://www.youtube.com/embed/${planet.embedId}" frameborder="0" allowfullscreen></iframe>
                    </div>
                </div>`;
        });
    }

    showHome();
</script>
