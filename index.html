<script>
/* ===== YOUR ORIGINAL JS WITH ONLY ONE CHANGE ===== */

const SOLAR_DATABASE = [
{ name:"Mercury", period:88, distance:"57.9 million", video:"zUlkcbZ7Pvs", desc:"..." },
{ name:"Venus", period:224.7, distance:"108.2 million", video:"6hWwo9aIcmg", desc:"..." },
{ name:"Earth", period:365.25, distance:"149.6 million", video:"UcKZSMwK7TA", desc:"..." },
{ name:"Mars", period:687, distance:"227.9 million", video:"IfG4B6wL7q8", desc:"..." },
{ name:"Jupiter", period:4333, distance:"778.6 million", video:"wIrbnshKDXc", desc:"..." },
{ name:"Saturn", period:10759, distance:"1.4 billion", video:"LQlDUDf6JrE", desc:"..." },
{ name:"Uranus", period:30687, distance:"2.9 billion", video:"XV_7KDQRoR4", desc:"..." },
{ name:"Neptune", period:60190, distance:"4.5 billion", video:"nu4uB2BJwT0", desc:"..." }
];

function performCalculation() {
    const container = document.getElementById('planet-display-grid');
    container.innerHTML = '';

    SOLAR_DATABASE.forEach(planet => {
        const card = document.createElement('div');
        card.className = 'planet-card';
        card.innerHTML = `
            <div class="planet-header">${planet.name}</div>

            <div class="data-table">
                <div class="data-row"><span>Orbital Period:</span><span>${planet.period} days</span></div>
                <div class="data-row"><span>Distance:</span><span>${planet.distance} km</span></div>
            </div>

            <div class="planet-description">${planet.desc}</div>

            <div class="video-wrapper">
                <iframe src="https://www.youtube.com/embed/${planet.video}" allowfullscreen></iframe>
            </div>
        `;
        container.appendChild(card);
    });
}
</script>
